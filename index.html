
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhishek & Geetika Wedding</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<section class="scene hero">
  <h1>Abhishek & Geetika</h1>
</section>

<section class="scene ganesh">
  <img src="assets/ganesh.png" class="ganesh-img" alt="Ganesh">
  <h2>With the blessings of Lord Ganesha</h2>
</section>

<section class="scene events">
  <div class="events-box">
    <h2>Wedding Celebrations</h2>

    <div class="card">
      <h3>Engagement</h3>
      <p>18 April – 6 PM</p>
    </div>

    <div class="card">
      <h3>Mehndi & Sangeet</h3>
      <p>18 April – 8 PM</p>
    </div>

    <div class="card">
      <h3>Haldi</h3>
      <p>19 April – Afternoon</p>
    </div>

    <div class="card">
      <h3>Wedding Ceremony</h3>
      <p>19 April – 7 PM</p>
    </div>

  </div>
</section>

<section class="scene car">
  <img src="assets/car.svg" class="car-img" alt="Wedding Car">
</section>

<section class="scene closing">
  <h2>Utsav Hotel • Bikaner</h2>
  <p>19 April 2026</p>
</section>

<button id="music-btn">🔊</button>

<audio id="music" loop>
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
